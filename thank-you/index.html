<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>感謝諮詢！咻咻打包將盡快與您聯繫</title>
<meta name="description" content="感謝您的諮詢申請！咻咻打包將在 1-2 個工作天內與您聯繫。">
<meta name="robots" content="noindex,nofollow">
<link rel="canonical" href="https://www.shooshoo.com.tw/thank-you/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<style>
:root{--cr:#FFF8ED;--crl:#FFFCF5;--crd:#FFE9C8;--og:#DCA54A;--yw:#FFC845;--br:#2D1B0E;--brm:#5C3D1E;--brl:#9B7250;--gy:#6B7280;--gn:#2ECC71;--lg:#06C755;--s1:0 2px 8px rgba(45,27,14,.08);--s2:0 6px 24px rgba(45,27,14,.12);--s3:0 12px 48px rgba(45,27,14,.16);--r1:12px;--r2:20px;--rf:9999px}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}body{font-family:'Noto Sans TC',-apple-system,sans-serif;background:var(--cr);color:var(--br);overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column}a{text-decoration:none;color:inherit}img{display:block;max-width:100%}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}@keyframes pulse{0%{transform:scale(1);opacity:.6}100%{transform:scale(1.8);opacity:0}}@keyframes confetti-fall{0%{transform:translateY(-100px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.nav{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(255,252,245,.93);backdrop-filter:blur(16px);border-bottom:1px solid rgba(45,27,14,.06)}.nav-in{max-width:1200px;margin:0 auto;padding:0 20px;height:72px;display:flex;align-items:center;justify-content:space-between;gap:8px}.logo{display:flex;align-items:center;gap:12px;flex-shrink:0}.logo img{width:48px;height:48px;object-fit:contain}.logo-name{font-size:20px;font-weight:900;color:var(--og)}.logo-en{font-size:11px;color:var(--brl)}
.ty-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:100px 20px 60px;position:relative;overflow:hidden}.ty-wrap::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,107,53,.07) 1.5px,transparent 1.5px);background-size:30px 30px;pointer-events:none}
.confetti{position:absolute;pointer-events:none}
.ty-card{background:#fff;border-radius:32px;padding:56px 48px;text-align:center;box-shadow:var(--s3);max-width:560px;width:100%;position:relative;z-index:1}.ty-char{height:160px;width:auto;margin:0 auto 24px;animation:float 3.5s ease-in-out infinite;filter:drop-shadow(0 16px 32px rgba(45,27,14,.12))}.ty-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(46,204,113,.1);border:1.5px solid rgba(46,204,113,.35);border-radius:var(--rf);padding:7px 18px;font-size:13px;font-weight:800;color:#27ae60;margin-bottom:20px}.ty-badge [data-lucide]{width:16px;height:16px}.ty-h1{font-size:clamp(26px,4vw,40px);font-weight:900;color:var(--br);line-height:1.25;margin-bottom:12px}.ty-h1 span{color:var(--og)}.ty-p{font-size:15px;color:var(--brm);line-height:1.75;margin-bottom:28px;text-wrap:pretty}.ty-steps{display:flex;flex-direction:column;gap:10px;margin-bottom:32px;text-align:left}.ty-step{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--cr);border-radius:var(--r1)}.ty-step-n{width:28px;height:28px;flex-shrink:0;border-radius:50%;background:var(--og);color:#fff;font-size:13px;font-weight:900;display:flex;align-items:center;justify-content:center}.ty-step-t{font-size:14px;font-weight:700;color:var(--brm)}.ty-btns{display:flex;flex-wrap:wrap;gap:12px;justify-content:center}.tybtn{display:inline-flex;align-items:center;gap:8px;padding:13px 22px;border-radius:var(--rf);font-size:14px;font-weight:800;transition:all .25s}.tybtn-ln{background:var(--lg);color:#fff;box-shadow:0 4px 14px rgba(6,199,85,.35)}.tybtn-ln:hover{transform:translateY(-2px)}.tybtn-gh{background:#fff;color:var(--og);border:2px solid var(--og)}.tybtn-gh:hover{background:var(--og);color:#fff}.tybtn [data-lucide]{width:16px;height:16px}

footer{background:#FFF8ED;padding:32px 20px 20px}.foot-in{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}.foot-logo{display:flex;align-items:center;gap:10px}.foot-logo img{width:36px;height:36px;object-fit:contain}.foot-bname{font-size:15px;font-weight:900;color:var(--og)}.tabnum{font-variant-numeric:tabular-nums}.foot-copy{font-size:12px;color:rgba(41,37,15,.4)}.foot-copy span{color:rgba(41,37,15,.6)}.foot-links{display:flex;gap:16px}.foot-links a{font-size:12px;color:rgba(41,37,15,.45);transition:color .2s}.foot-links a:hover{color:var(--og)}
@media(max-width:560px){.ty-card{padding:40px 24px}.tybtn{flex:1;justify-content:center}.foot-in{flex-direction:column;text-align:center}}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-in">
    <a href="/" class="logo"><img src="https://www.shooshoo.com.tw/wp-content/uploads/2026/06/shooshoo-char-logo.png" alt="咻咻打包"><div><div class="logo-name">咻咻打包</div><div class="logo-en">ShooShoo Packing</div></div></a>
    <a href="/" style="font-size:14px;font-weight:700;color:var(--brm);padding:8px 14px;border-radius:var(--r1);background:var(--cr)"><i data-lucide="home" style="display:inline;width:14px;height:14px;vertical-align:middle;margin-right:4px"></i>回首頁</a>
  </div>
</nav>

<div class="ty-wrap" id="tyWrap">
  <div class="ty-card" id="tyCard">
    <img class="ty-char" src="https://www.shooshoo.com.tw/wp-content/uploads/2026/06/shooshoo-char-main.png" alt="咻咻">
    <div class="ty-badge"><i data-lucide="check-circle"></i>諮詢已成功送出</div>
    <h1 class="ty-h1">謝謝你選擇<br><span>咻咻打包</span>！</h1>
    <p class="ty-p">你的諮詢申請已成功送出，咻咻打包的專人將盡快與你聯繫，討論最適合你的倉儲出貨方案。</p>
    <div class="ty-steps">
      <div class="ty-step"><div class="ty-step-n">1</div><div class="ty-step-t">✅ 表單送出成功——我們已收到你的需求</div></div>
      <div class="ty-step"><div class="ty-step-n">2</div><div class="ty-step-t">📋 1–2 工作天內專人審核你的需求</div></div>
      <div class="ty-step"><div class="ty-step-n">3</div><div class="ty-step-t">📞 我們主動聯繫你，討論合作細節</div></div>
    </div>
    <div class="ty-btns">
      <a href="https://lin.ee/L9HtuyF" target="_blank" class="tybtn tybtn-ln"><i data-lucide="message-circle"></i>加 LINE 加快回覆</a>
      <a href="/" class="tybtn tybtn-gh"><i data-lucide="home"></i>回到首頁</a>
    </div>
  </div>
</div>

<footer>
  <div class="foot-in">
    <div class="foot-logo"><img src="https://www.shooshoo.com.tw/wp-content/uploads/2026/01/logo.png" alt="咻咻打包"><div class="foot-bname">咻咻打包</div></div>
    <div class="foot-copy">© 2026 <span>咻咻打包 ShooShoo Packing</span>．翰鮮運營企業有限公司</div>
    <div class="foot-links"><a href="/shooshoo-preview/flow/">倉儲服務</a><a href="/shooshoo-preview/wms/">WMS</a><a href="/shooshoo-preview/consult/">諮詢</a><a href="/shooshoo-preview/about/">關於我們</a></div>
  </div>
</footer>
<script>
if(typeof lucide!=='undefined')lucide.createIcons();
const colors=['#DCA54A','#FFC845','#2ECC71','#FF8F5E','#FFD700'];
for(let i=0;i<18;i++){const el=document.createElement('div');el.className='confetti';el.style.cssText=`position:absolute;left:${Math.random()*100}%;top:-20px;width:${6+Math.random()*6}px;height:${6+Math.random()*6}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation:confetti-fall ${2+Math.random()*3}s ease-in ${Math.random()*2}s forwards`;document.getElementById('tyWrap').appendChild(el);}
if(typeof gsap!=='undefined'){gsap.set('#tyCard',{autoAlpha:0,y:40,scale:.94});gsap.to('#tyCard',{autoAlpha:1,y:0,scale:1,duration:.8,ease:'back.out(1.5)',delay:.2});}
</script>
</body>
</html>
